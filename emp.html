<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>تسجيل الطلبات - الكسواني</title>
  <meta name="theme-color" content="#1a3a2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="الطلبات">
  <link rel="manifest" href="manifest-emp.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="icon-192.png">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Tajawal',sans-serif;
      background:#1a3a2a;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:20px;
      text-align:center;
    }
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap');
    .logo{font-size:3rem;margin-bottom:16px;}
    .title{color:#c9a84c;font-size:1.3rem;font-weight:800;margin-bottom:6px;}
    .sub{color:rgba(255,255,255,0.65);font-size:0.9rem;margin-bottom:30px;}
    .btn{
      display:inline-block;
      background:#c9a84c;
      color:#1a3a2a;
      font-family:'Tajawal',sans-serif;
      font-weight:800;
      font-size:1rem;
      padding:14px 32px;
      border-radius:14px;
      text-decoration:none;
      cursor:pointer;
    }
    .note{color:rgba(255,255,255,0.4);font-size:0.75rem;margin-top:18px;}
  </style>
</head>
<body>
  <div class="logo">📋</div>
  <div class="title">تسجيل الطلبات</div>
  <div class="sub">الكسواني روزميري</div>
  <a class="btn" href="index.html?emp=1">دخول الموظفين ←</a>
  <div class="note">ثبّت هذا التطبيق على شاشتك الرئيسية للوصول السريع</div>

  <script>
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
    // Auto-redirect after 0.8s for seamless experience
    setTimeout(()=>{location.href='index.html?emp=1';}, 800);
  </script>
</body>
</html>
